<div class="app-layout" [class.app-layout--with-side-nav]="showNav() && isDesktop()" [class.app-layout--with-bottom-nav]="showNav() && !isDesktop()">
  <main class="app-main">
    <router-outlet />
  </main>

  @if (showNav()) {
    <ui-nav-list 
      [position]="isDesktop() ? 'side' : 'bottom'" 
      [justify]="isDesktop() ? 'start' : 'around'"
      [uiScrollHide]="!isDesktop()"
    >
      <ui-nav-item 
        [layout]="isDesktop() ? 'horizontal' : 'vertical'" 
        iconSize="md" 
        [active]="isActive('/home')" 
        (clicked)="go('/home')"
      >
        <svg icon lucideHome aria-hidden="true"></svg>
        <span label>Home</span>
      </ui-nav-item>
      
      @if (isAuthenticated()) {
        <ui-nav-item 
          [layout]="isDesktop() ? 'horizontal' : 'vertical'" 
          iconSize="md" 
          [active]="isActive('/profile')" 
          (clicked)="go('/profile')"
        >
          <svg icon lucideUser aria-hidden="true"></svg>
          <span label>Profile</span>
        </ui-nav-item>
      } @else {
        <ui-nav-item 
          [layout]="isDesktop() ? 'horizontal' : 'vertical'" 
          iconSize="md" 
          [active]="isActive('/auth/login')" 
          (clicked)="go('/auth/login')"
        >
          <svg icon lucideLogIn aria-hidden="true"></svg>
          <span label>Login</span>
        </ui-nav-item>
      }
    </ui-nav-list>
  }
</div>

<app-toast-container />
