<app-auth-card
  subtitle="Sign in to discover what's near you"
  footerText="Don't have an account?"
  footerLinkLabel="Create one"
  footerLinkRoute="/auth/register"
>
  <form class="auth-form" (submit)="onSubmit($event)">
    <app-form-field
      label="Email"
      fieldId="email"
      [touched]="loginForm.email().touched()"
      [invalid]="loginForm.email().invalid()"
      [errorMessage]="loginForm.email().errors()[0]?.message"
    >
      <input
        id="email"
        class="field__input"
        type="email"
        placeholder="you@example.com"
        autocomplete="email"
        [formField]="loginForm.email"
        [class.field__input--error]="loginForm.email().touched() && loginForm.email().invalid()"
      />
    </app-form-field>

    <app-password-field
      label="Password"
      fieldId="password"
      [formField]="loginForm.password"
      [touched]="loginForm.password().touched()"
      [invalid]="loginForm.password().invalid()"
      [errorMessage]="loginForm.password().errors()[0]?.message"
    ></app-password-field>

    <div class="auth-form__row">
      <label class="auth-form__remember">
        <input class="auth-form__checkbox" type="checkbox" [formField]="loginForm.remember" />
        <span>Keep me signed in</span>
      </label>
      <a class="auth-form__forgot" routerLink="/auth/forgot-password">Forgot password?</a>
    </div>

    <button
      class="btn btn--primary btn--full auth-form__submit"
      type="submit"
      [disabled]="loading() || isFormInvalid()"
    >
      @if (loading()) {
      <svg lucideLoaderCircle class="auth-form__spinner" aria-hidden="true"></svg>
      Signing in… } @else { Sign in }
    </button>
  </form>
</app-auth-card>
