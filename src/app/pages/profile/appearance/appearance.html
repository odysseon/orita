<div class="appearance-page">
  <p class="appearance-hint">
    Choose how Orita looks to you. System follows your device preference automatically.
  </p>

  <div class="theme-options">
    @for (option of options; track option.value) {
    <button
      class="theme-option"
      [class.theme-option--active]="theme.preference() === option.value"
      (click)="select(option.value)"
      type="button"
    >
      <div class="theme-option__icon">
        <svg [lucideIcon]="option.icon" aria-hidden="true"></svg>
      </div>
      <div class="theme-option__text">
        <span class="theme-option__label">{{ option.label }}</span>
        <span class="theme-option__description">{{ option.description }}</span>
      </div>
      <div
        class="theme-option__indicator"
        [class.theme-option__indicator--active]="theme.preference() === option.value"
      ></div>
    </button>
    }
  </div>
</div>
